name: electric-prod

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: energy_backend_prod
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8081:8000" # 供除錯與 Seeding 執行使用
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres.fdctiycwfvdcqprwoqib:2336435323375145@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-text-embedding-004}
      - FRONTEND_URL=http://localhost:3080
      - ENV=production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ""
    container_name: energy_frontend_prod
    restart: always
    ports:
      - "3080:80"
    depends_on:
      - backend
